<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — 포토-송 영상 카드</title>
<style>
  :root{--bg:#0b0910;--panel:rgba(255,255,255,.045);--border:rgba(255,255,255,.10);--text:#f0edf6;--dim:#a49db8;--muted:#605874;
    --gold:#f5c469;--rose:#ff8fb0;--cyan:#5fd6d0;--violet:#a78bff;
    --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',sans-serif;--serif:'Georgia','Apple SD Gothic Neo',serif;--mono:'SF Mono','Fira Code',ui-monospace,monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(167,139,255,.10),transparent 55%),var(--bg);color:var(--text);font-family:var(--font);padding:20px 14px;}
  .wrap{max-width:820px;margin:0 auto;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  .top{text-align:center;}
  .top .kick{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;}
  .top h1{font-family:var(--serif);font-size:24px;font-weight:600;margin-top:6px;}
  .top h1 .g{background:linear-gradient(90deg,var(--gold),var(--rose),var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .top p{font-size:13px;color:var(--dim);margin-top:4px;}
  .bar{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:16px 0;}
  .btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--dim);font-size:12.5px;cursor:pointer;font-family:var(--mono);transition:.15s;}
  .btn:hover{border-color:rgba(255,255,255,.3);color:var(--text);}
  .btn.primary{background:linear-gradient(90deg,var(--gold),var(--rose));border-color:transparent;color:#1a1014;font-weight:700;}
  .btn.rec{color:var(--rose);border-color:rgba(255,143,176,.35);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  input[type=file]{display:none;}
  .cardwrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .cardbox{position:relative;width:360px;max-width:92vw;border-radius:22px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  #card{display:block;width:100%;height:auto;background:#0e0b16;}
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;}
  .empty .big{font-size:34px;}
  .status{font-family:var(--mono);font-size:11px;color:var(--muted);min-height:16px;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .foot{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:14px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <h2 class="sr-only">파형이 노래에 맞춰 움직이는 포토-송 영상 카드를 만들고 webm 영상으로 저장</h2>
  <div class="top">
    <div class="kick">AURA · Photo-Song Video · animated & recordable</div>
    <h1><span class="g">③</span> 포토-송 영상 카드</h1>
    <p>파형이 노래에 맞춰 살아 움직이는 카드. 오디오 포함 영상(webm)으로 저장하세요.</p>
  </div>
  <div class="bar">
    <label class="btn primary" for="file">📁 사진 올리기</label>
    <input type="file" id="file" accept="image/*">
    <button class="btn" data-s="sunset">🌅 일몰</button>
    <button class="btn" data-s="night">🌃 밤거리</button>
    <button class="btn" data-s="forest">🌲 숲</button>
  </div>
  <div class="cardwrap">
    <div class="cardbox">
      <canvas id="card" width="540" height="960"></canvas>
      <div class="empty" id="empty"><div class="big">🎬</div><div>사진을 올리거나 샘플 선택</div></div>
    </div>
    <div class="status" id="status"></div>
    <div class="actions">
      <button class="btn primary" id="play" disabled>▶ 재생</button>
      <button class="btn rec" id="rec" disabled>⏺ 영상으로 녹화·저장</button>
      <button class="btn" id="retitle" disabled>↻ 제목</button>
    </div>
  </div>
  <p class="foot">캔버스 애니메이션 + Web Audio → MediaRecorder(webm, 오디오 포함). 완전 브라우저 네이티브 · CDN 불필요.</p>
</div>

<script>
const $=id=>document.getElementById(id);
const card=$('card'),cx=card.getContext('2d');
const CW=540,CH=960;
let img=null,analysis=null,baseWave=[],title='',tag='',t0anim=0;

function genSample(kind){const c=document.createElement('canvas');c.width=480;c.height=340;const g=c.getContext('2d');
  if(kind==='sunset'){const gr=g.createLinearGradient(0,0,0,340);gr.addColorStop(0,'#2a1a4a');gr.addColorStop(.5,'#e85c3a');gr.addColorStop(.75,'#ffb347');gr.addColorStop(1,'#3a2416');g.fillStyle=gr;g.fillRect(0,0,480,340);g.fillStyle='rgba(255,240,180,.9)';g.beginPath();g.arc(330,190,32,0,7);g.fill();g.fillStyle='#1a0f14';g.fillRect(0,290,480,50);}
  else if(kind==='night'){g.fillStyle='#070a16';g.fillRect(0,0,480,340);for(let i=0;i<90;i++){g.fillStyle=`rgba(${120+Math.random()*130},${140+Math.random()*100},${200+Math.random()*55},${.4+Math.random()*.6})`;g.fillRect(Math.random()*480,160+Math.random()*180,2+Math.random()*3,2+Math.random()*3);}g.fillStyle='rgba(90,130,255,.2)';g.fillRect(0,130,480,40);g.fillStyle='#0a0e1e';g.fillRect(0,0,480,130);}
  else{const gr=g.createLinearGradient(0,0,0,340);gr.addColorStop(0,'#123a24');gr.addColorStop(1,'#0a1f14');g.fillStyle=gr;g.fillRect(0,0,480,340);for(let i=0;i<44;i++){g.strokeStyle=`rgba(${40+Math.random()*60},${90+Math.random()*80},${50+Math.random()*40},.6)`;g.lineWidth=3+Math.random()*8;g.beginPath();const x=Math.random()*480;g.moveTo(x,340);g.lineTo(x+(Math.random()-.5)*40,Math.random()*150);g.stroke();}}
  const im=new Image();im.src=c.toDataURL();return im;}

function rgb2hsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}return[h*360,s,l];}
function hex(r,g,b){return '#'+[r,g,b].map(x=>Math.round(Math.max(0,Math.min(255,x))).toString(16).padStart(2,'0')).join('');}

function loadImg(im){img=im;$('empty').style.display='none';analyze();['play','rec','retitle'].forEach(id=>$(id).disabled=false);}
$('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const im=new Image();im.onload=()=>loadImg(im);im.src=ev.target.result;};r.readAsDataURL(f);});
document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{const im=genSample(b.dataset.s);im.onload=()=>loadImg(im);if(im.complete)loadImg(im);});

const TITLES={pos:['빛이 머문 자리','반짝이던 그 순간','따뜻한 하루의 결'],neg:['어둠을 지나 빛으로','고요가 감싼 밤','조용히, 그러나 분명히'],neu:['잔잔한 오후','머무는 마음','흐르는 시간']};
function pickTitle(){const a=analysis.aura;const pool=a>0.25?TITLES.pos:a<-0.25?TITLES.neg:TITLES.neu;title=pool[Math.floor(Math.random()*pool.length)];}

function analyze(){
  const sw=100,sh=Math.round(100*(img.height/img.width))||100;const oc=document.createElement('canvas');oc.width=sw;oc.height=sh;const o=oc.getContext('2d');o.drawImage(img,0,0,sw,sh);
  let data;try{data=o.getImageData(0,0,sw,sh).data;}catch(e){return;}
  const bins={};let sB=0,sS=0,sW=0,n=0;
  for(let i=0;i<data.length;i+=4){const r=data[i],g=data[i+1],b=data[i+2];const key=(r>>5)+'_'+(g>>5)+'_'+(b>>5);if(!bins[key])bins[key]={r:0,g:0,b:0,c:0};bins[key].r+=r;bins[key].g+=g;bins[key].b+=b;bins[key].c++;const[h,s,l]=rgb2hsl(r,g,b);sB+=l;sS+=s;sW+=(r-b)/255;n++;}
  const palette=Object.values(bins).sort((a,b)=>b.c-a.c).slice(0,5).map(o=>({r:Math.round(o.r/o.c),g:Math.round(o.g/o.c),b:Math.round(o.b/o.c)}));
  const bright=sB/n,sat=sS/n,warm=sW/n;const[dh]=rgb2hsl(palette[0].r,palette[0].g,palette[0].b);
  const aura=Math.max(-1,Math.min(1,(bright-0.45)*1.6+warm*0.9+(sat-0.3)*0.6));
  baseWave=[];const cols=64;for(let c=0;c<cols;c++){let s=0;const x=Math.floor(c/cols*sw);for(let y=0;y<sh;y++){const i=(y*sw+x)*4;s+=(0.299*data[i]+0.587*data[i+1]+0.114*data[i+2])/255;}baseWave.push(s/sh);}
  const hn=['빨강','주황','노랑','연두','초록','청록','파랑','보라','자주'][Math.floor(((dh+20)%360)/40)];
  analysis={palette,bright,sat,warm,aura,domHue:dh};tag='#'+hn+'_'+(aura>0.25?'bright':aura<-0.25?'deep':'calm');pickTitle();
}

// ---- energy envelope over the song (drives animation) ----
let songStart=0,songDur=0,playing=false;
function energyAt(p){ // p 0..1 progress
  if(p<0.35)return 0.4+0.3*p/0.35;                 // intro
  if(p<0.7)return 0.55+0.35*(p-0.35)/0.35;          // build
  if(p<0.85)return 0.9+0.1*Math.sin((p-0.7)/0.15*6.28);// climax (happy ending)
  return Math.max(0,0.95-(p-0.85)/0.15*0.7);        // tail
}
function drawFrame(ts){
  requestAnimationFrame(drawFrame);
  if(!analysis){return;}
  const time=ts/1000;
  let p=0,en=0.4;
  if(playing){p=Math.min(1,(performance.now()-songStart)/(songDur*1000));en=energyAt(p);}
  const a=analysis;
  // bg — warms/brightens toward happy ending
  const warmBoost=playing?Math.max(0,p-0.6)*0.5:0;
  const bg=cx.createLinearGradient(0,0,0,CH);bg.addColorStop(0,`rgb(${16+warmBoost*60},${11+warmBoost*30},${26+warmBoost*10})`);bg.addColorStop(1,'#07050e');cx.fillStyle=bg;cx.fillRect(0,0,CW,CH);
  // photo
  const pad=36,pw=CW-pad*2,py=52,phc=Math.min(pw*(img.height/img.width),560);
  cx.save();roundRect(cx,pad,py,pw,phc,16);cx.clip();
  const ar=img.width/img.height,cr=pw/phc;let dw,dh,dx,dy;if(ar>cr){dh=phc;dw=phc*ar;dx=pad-(dw-pw)/2;dy=py;}else{dw=pw;dh=pw/ar;dx=pad;dy=py-(dh-phc)/2;}
  cx.drawImage(img,dx,dy,dw,dh);
  const fg=cx.createLinearGradient(0,py+phc-160,0,py+phc);fg.addColorStop(0,'rgba(16,11,26,0)');fg.addColorStop(1,`rgba(${16+warmBoost*60},11,26,.92)`);cx.fillStyle=fg;cx.fillRect(pad,py+phc-160,pw,160);
  cx.restore();
  // title
  cx.textAlign='left';cx.fillStyle='#fff';cx.font='600 34px Georgia, serif';cx.fillText(title,pad+6,py+phc-34);
  cx.fillStyle='rgba(245,196,105,.95)';cx.font='500 17px monospace';cx.fillText(tag,pad+6,py+phc-12);
  // animated waveform
  const wy=py+phc+56,wh=120,wx=pad,ww=pw;const[pr,pg,pb]=[a.palette[0].r,a.palette[0].g,a.palette[0].b];
  cx.globalCompositeOperation='lighter';
  cx.strokeStyle=hex(pr+50,pg+50,pb+70);cx.lineWidth=2.5;cx.lineJoin='round';cx.beginPath();
  for(let i=0;i<baseWave.length;i++){const x=wx+i/(baseWave.length-1)*ww;
    const mod=Math.sin(time*4 + i*0.5)*0.5+0.5;
    const amp=((baseWave[i]-0.5))*wh*(0.6+en*1.6)* (0.6+0.8*mod);
    const y=wy+wh/2-amp;i?cx.lineTo(x,y):cx.moveTo(x,y);}
  cx.stroke();
  // mirror bars pulse
  for(let i=0;i<baseWave.length;i++){const x=wx+i/(baseWave.length-1)*ww;const mod=Math.abs(Math.sin(time*5+i*0.6));const h=baseWave[i]*wh*(0.5+en)*mod;cx.fillStyle=`rgba(${pr+70},${pg+70},${pb+90},${0.3*en})`;cx.fillRect(x-1.4,wy+wh/2-h/2,2.8,h);}
  // playhead
  if(playing){const hx=wx+p*ww;cx.strokeStyle='rgba(255,255,255,.6)';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(hx,wy);cx.lineTo(hx,wy+wh);cx.stroke();}
  cx.globalCompositeOperation='source-over';
  // palette dots + aura chip
  const ry=wy+wh+52;
  const auraLbl=a.aura>0.25?'긍정·밝음':a.aura<-0.25?'해피엔딩 아크':'잔잔';
  cx.fillStyle='rgba(255,255,255,.08)';roundRect(cx,pad,ry-24,240,38,19);cx.fill();
  cx.fillStyle=a.aura>0.25?'#f5c469':a.aura<-0.25?'#a78bff':'#5fd6d0';cx.beginPath();cx.arc(pad+22,ry-5,7,0,7);cx.fill();
  cx.fillStyle='#eee';cx.font='500 18px sans-serif';cx.textAlign='left';cx.fillText('아우라 · '+auraLbl,pad+38,ry+1);
  a.palette.forEach((pp,i)=>{cx.fillStyle=hex(pp.r,pp.g,pp.b);cx.beginPath();cx.arc(CW-pad-14-i*34,ry-5,13,0,7);cx.fill();});
  // brand
  cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.5)';cx.font='500 20px Georgia, serif';cx.fillText('AURA',CW/2,CH-50);
  cx.fillStyle='rgba(255,255,255,.28)';cx.font='400 13px monospace';cx.fillText('사진을 노래로',CW/2,CH-28);
}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
requestAnimationFrame(drawFrame);

// ---- audio (with recordable destination) ----
let actx=null,master=null,recDest=null;
function m2f(m){return 440*Math.pow(2,(m-69)/12);}
function ensure(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.22;const f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=2200;const dl=actx.createDelay();dl.delayTime.value=0.3;const fb=actx.createGain();fb.gain.value=0.28;master.connect(f);f.connect(actx.destination);master.connect(dl);dl.connect(fb);fb.connect(dl);dl.connect(actx.destination);recDest=actx.createMediaStreamDestination();master.connect(recDest);}else actx.resume();}
function tone(fr,t,dur,vol,type){const o=actx.createOscillator(),g=actx.createGain();o.type=type||'sine';o.frequency.value=fr;o.connect(g);g.connect(master);g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol,t+0.03);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.05);}
function schedule(){const a=analysis,t=actx.currentTime;const root=48+Math.floor(((a.domHue)%360)/360*10);const tempo=0.5-a.sat*0.18;const dark=a.aura<-0.1;const minor=[0,2,3,7,10,12],major=[0,2,4,7,9,12,16];let time=t;const p1=dark?minor:major;
  for(let i=0;i<6;i++){tone(m2f(root+p1[i%p1.length]),time,tempo*2.4,0.12,dark?'triangle':'sine');time+=tempo;}
  tone(m2f(root-12),t,tempo*8,0.10,'sine');tone(m2f(root-5),t,tempo*8,0.08,'sine');
  for(let i=0;i<6;i++){tone(m2f(root+(dark?minor:major)[i%6]+7),time,tempo*1.8,0.11,'sine');time+=tempo*0.8;}
  const gr=root+12,chord=[0,4,7,12,16],rt=time+0.1;chord.forEach(s=>{tone(m2f(gr+s),rt,2.8,0.13,'sine');tone(m2f(gr+s+12),rt,2.6,0.06,'triangle');});
  [0,4,7,12,16,19].forEach((s,i)=>tone(m2f(gr+s),rt+i*0.12,1.6,0.12,'sine'));tone(m2f(gr-24),rt,3,0.12,'sine');
  return (time-t)+3.3;}
function startSong(){ensure();songDur=schedule();songStart=performance.now();playing=true;
  setTimeout(()=>{playing=false;},songDur*1000);return songDur;}
$('play').onclick=()=>{if(!playing){$('play').textContent='♪…';const d=startSong();setTimeout(()=>$('play').textContent='▶ 재생',d*1000);}};
$('retitle').onclick=()=>{if(analysis)pickTitle();};

// ---- record to webm (canvas video + audio) ----
$('rec').onclick=async()=>{
  if(playing)return;ensure();
  const canvasStream=card.captureStream(30);
  const stream=new MediaStream([...canvasStream.getVideoTracks(),...recDest.stream.getAudioTracks()]);
  let mime='video/webm;codecs=vp9,opus';if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
  const mr=new MediaRecorder(stream,{mimeType:mime});const chunks=[];
  mr.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
  mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aura_photosong.webm';a.click();$('status').textContent='✓ 영상 저장 완료 (webm)';$('rec').disabled=false;$('rec').textContent='⏺ 영상으로 녹화·저장';};
  $('rec').disabled=true;$('rec').textContent='● 녹화 중…';$('status').textContent='녹화 중… 노래가 끝나면 자동 저장됩니다';
  mr.start();const d=startSong();setTimeout(()=>mr.stop(),(d+0.4)*1000);
};
</script>
</body>
</html>
